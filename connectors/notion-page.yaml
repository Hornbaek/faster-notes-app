id: notion-page
name: Notion — create a database page
description: >-
  Create a page in a Notion database from each note (title + a summary paragraph).
  Create an internal integration at notion.so/my-integrations, share your database
  with it, store the token as the secret 'notion_token', and paste the database id.
  The database's title column must be named "Name" (or edit this connector's body).
family: api
needs_secrets: [notion_token]
needs_config:
  - {key: database_id, label: "Notion database ID", placeholder: "32-char id from the database URL"}
connector:
  type: http_request
  method: POST
  url: "https://api.notion.com/v1/pages"
  headers:
    Authorization: "Bearer {{secret.notion_token}}"
    Notion-Version: "2022-06-28"
  body_type: json
  body:
    parent:
      database_id: "{{config.database_id}}"
    properties:
      Name:
        title:
          - text:
              content: "{{title}}"
    children:
      - object: block
        type: paragraph
        paragraph:
          rich_text:
            - type: text
              text:
                content: "{{summary}}"
enabled: true
